<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
      color: #e2e8f0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      transition: cursor 0.3s ease;
    }

    /* 隐藏鼠标光标的类 */
    .hide-cursor {
      cursor: none !important;
    }

    /* 顶级细节：全局胶片噪点滤镜 */
    .noise-overlay {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      width: 100%;
      height: 100%;
      opacity: 0.035;
    }

    /* 动画定义 */
    @keyframes infinitePan {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-5%, -5%); }
    }
    
    @keyframes cellEmergence {
      0% { transform: scale(0.6); opacity: 0; filter: blur(12px) brightness(2); }
      50% { transform: scale(1.03); opacity: 1; filter: blur(0px) brightness(1.2); }
      100% { transform: scale(1); opacity: 1; filter: blur(0px) brightness(1); }
    }

    @keyframes glint {
      0% { transform: translateX(-150%) skewX(-25deg); opacity: 0; }
      50% { opacity: 0.4; }
      100% { transform: translateX(150%) skewX(-25deg); opacity: 0; }
    }

    .animate-infinite-pan {
      animation: infinitePan 90s linear infinite alternate;
    }

    .animate-cell-emergence {
      animation: cellEmergence 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    
    .glint-effect::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.5), transparent);
      transform: translateX(-150%) skewX(-25deg);
      animation: glint 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      z-index: 2;
    }

    /* 核心自适应弹性布局 (Justified Gallery) */
    .justified-gallery {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      /* 响应式基准高度 */
      --base-height: 120px;
    }
    @media (min-width: 640px) { .justified-gallery { --base-height: 160px; } }
    @media (min-width: 1024px) { .justified-gallery { --base-height: 220px; } }
    @media (min-width: 1536px) { .justified-gallery { --base-height: 280px; } }

    .justified-item {
      position: relative;
      /* 宽度伸缩由真实比例决定 */
      flex-grow: var(--ratio);
      flex-shrink: 1;
      flex-basis: calc(var(--base-height) * var(--ratio));
      /* 强制锁定当前盒子的宽高比 */
      aspect-ratio: var(--ratio);
      margin: 0; 
      padding: 0;
    }

    /* 防止最后一行无限拉伸导致变形 */
    .justified-gallery::after {
      content: '';
      flex-grow: 999999999;
      height: 0;
    }

    /* 隐藏滚动条 */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="selection:bg-white/20">

  <!-- 噪点遮罩 -->
  <svg class="noise-overlay">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)" />
  </svg>

  <!-- 隐藏的文件选择器 -->
  <input type="file" id="fileInput" webkitdirectory directory multiple class="hidden" />

  <!-- 极简悬浮导航栏：靠右、玻璃效果、空闲时透明度增加 -->
  <header id="top-header" class="fixed top-0 right-0 z-40 p-5 md:p-8 flex items-center justify-end pointer-events-none transition-opacity duration-700 ease-in-out">
    <div class="pointer-events-auto flex items-center gap-1 p-1.5 rounded-full bg-black/40 backdrop-blur-xl border border-white/10 shadow-2xl transition-all duration-300 hover:bg-black/60">
      
      <!-- 全屏切换按钮 -->
      <button id="btn-fullscreen" class="flex items-center justify-center w-10 h-10 text-white/70 hover:text-white rounded-full hover:bg-white/10 transition-colors" title="全屏显示">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      </button>

      <!-- 分隔线 -->
      <div class="w-px h-5 bg-white/10 mx-1"></div>
      
      <!-- 更换文件夹按钮 -->
      <button id="btn-change-folder" class="flex items-center gap-2.5 px-5 py-2 text-white/80 hover:text-white rounded-full font-medium text-sm transition-colors hover:bg-white/10 active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/></svg>
        <span class="hidden sm:inline">更换文件夹</span>
      </button>
      
    </div>
  </header>

  <!-- 主展示区：网格 -->
  <main class="w-full h-screen relative z-0">
    <div id="grid-container" class="absolute inset-[-15%] w-[130%] h-[130%] animate-infinite-pan will-change-transform z-0 hidden">
      <div id="justified-gallery" class="justified-gallery w-full h-full">
        <!-- 动态生成的图片格子会插入这里 -->
      </div>
    </div>

    <!-- 状态遮罩层 (欢迎页 / 加载中 / 错误) -->
    <div id="status-overlay" class="absolute inset-0 z-30 flex items-center justify-center bg-black/60 backdrop-blur-md">
      
      <!-- 欢迎页 -->
      <div id="welcome-screen" class="flex flex-col items-center text-center p-12 bg-white/5 rounded-[2.5rem] border border-white/10 backdrop-blur-2xl shadow-2xl animate-in fade-in zoom-in-95 duration-700 max-w-lg mx-4">
        <div id="btn-welcome-folder" class="w-24 h-24 mb-8 rounded-full bg-white/10 border border-white/20 flex items-center justify-center shadow-inner cursor-pointer hover:bg-white/20 transition-all duration-300 group hover:scale-105">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/50 group-hover:text-white transition-colors"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/></svg>
        </div>
        <h2 class="text-3xl font-semibold text-white mb-4 tracking-tight">自适应比例瀑布流</h2>
        <p class="text-white/50 mb-10 text-base leading-relaxed">
          自动读取本地图片原始比例，生成错落有致的无缝墙。智能过滤重复图像，保护隐私且无比流畅。
        </p>
        <button id="btn-start" class="px-10 py-4 bg-white text-black rounded-full font-bold text-base transition-all duration-300 shadow-xl hover:shadow-white/20 hover:-translate-y-1 active:translate-y-0 w-full sm:w-auto">
          选择本地文件夹
        </button>
      </div>

      <!-- 加载中 -->
      <div id="loading-screen" class="hidden flex-col items-center gap-6 text-white/80">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin text-white/60"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <p class="text-lg font-medium tracking-widest uppercase animate-pulse">Scanning Dimensions...</p>
      </div>

      <!-- 错误提示 -->
      <div id="error-screen" class="hidden p-5 bg-red-950/80 border border-red-500/50 rounded-2xl flex items-center gap-3 text-red-200 shadow-2xl">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        <p id="error-text" class="font-medium"></p>
      </div>

    </div>
  </main>

  <!-- 沉浸式全屏灯箱 -->
  <div id="lightbox" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/98 backdrop-blur-3xl transition-opacity duration-300 opacity-0">
    <div class="absolute top-0 inset-x-0 p-6 md:p-8 flex justify-between items-center z-50 bg-gradient-to-b from-black/80 to-transparent pointer-events-none">
      <div class="text-white/80 flex flex-col drop-shadow-md pointer-events-auto">
        <span id="lightbox-title" class="font-medium text-base truncate max-w-xs md:max-w-xl"></span>
        <span id="lightbox-count" class="text-xs text-white/40 mt-1 font-mono"></span>
      </div>
      <button id="btn-close-lightbox" class="pointer-events-auto p-3 rounded-full bg-white/10 hover:bg-white/20 text-white transition-all hover:rotate-90 border border-white/10 backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
      </button>
    </div>

    <button id="btn-prev-lightbox" class="absolute left-4 md:left-8 p-4 rounded-full bg-white/5 hover:bg-white/10 text-white border border-white/5 transition-all hover:scale-110 z-50 hidden sm:block backdrop-blur-md">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>

    <div id="lightbox-backdrop" class="relative w-full h-full flex items-center justify-center p-4 md:p-24 cursor-pointer">
      <img id="lightbox-img" src="" alt="" class="max-w-full max-h-full object-contain shadow-2xl transition-transform duration-300 scale-95 cursor-auto" />
    </div>

    <button id="btn-next-lightbox" class="absolute right-4 md:right-8 p-4 rounded-full bg-white/5 hover:bg-white/10 text-white border border-white/5 transition-all hover:scale-110 z-50 hidden sm:block backdrop-blur-md">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>

  <script>
    // --- 状态管理 ---
    let allImages = [];
    let currentlyDisplayedUrls = new Set();
    let activeTimers = [];
    let selectedIndex = null;

    // --- DOM 元素引用 ---
    const fileInput = document.getElementById('fileInput');
    const gridContainer = document.getElementById('grid-container');
    const gallery = document.getElementById('justified-gallery');
    
    const statusOverlay = document.getElementById('status-overlay');
    const welcomeScreen = document.getElementById('welcome-screen');
    const loadingScreen = document.getElementById('loading-screen');
    const errorScreen = document.getElementById('error-screen');
    const errorText = document.getElementById('error-text');
    
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxTitle = document.getElementById('lightbox-title');
    const lightboxCount = document.getElementById('lightbox-count');

    // --- 沉浸式 UI 自动隐藏逻辑 (包含鼠标光标) ---
    const topHeader = document.getElementById('top-header');
    let idleTimer;

    function resetIdleTimer() {
      // 交互时立刻恢复全不透明，并显示光标
      topHeader.classList.remove('opacity-20');
      topHeader.classList.add('opacity-100');
      document.body.classList.remove('hide-cursor');
      
      clearTimeout(idleTimer);
      
      // 3秒钟没有交互，将透明度降低至 20%，融入背景，并隐藏鼠标光标
      idleTimer = setTimeout(() => {
        topHeader.classList.remove('opacity-100');
        topHeader.classList.add('opacity-20');
        document.body.classList.add('hide-cursor');
      }, 3000);
    }

    window.addEventListener('mousemove', resetIdleTimer);
    window.addEventListener('mousedown', resetIdleTimer);
    window.addEventListener('touchstart', resetIdleTimer);
    window.addEventListener('keydown', resetIdleTimer);
    resetIdleTimer(); // 初始启动

    // --- 全屏逻辑 ---
    const btnFullscreen = document.getElementById('btn-fullscreen');
    
    btnFullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.warn(`无法进入全屏模式: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    });

    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        // 切换为退出全屏图标
        btnFullscreen.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>`;
        btnFullscreen.title = "退出全屏";
      } else {
        // 切换为进入全屏图标
        btnFullscreen.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>`;
        btnFullscreen.title = "全屏显示";
      }
    });

    // --- 触发文件选择 ---
    const triggerFileSelect = () => fileInput.click();
    document.getElementById('btn-change-folder').addEventListener('click', triggerFileSelect);
    document.getElementById('btn-welcome-folder').addEventListener('click', triggerFileSelect);
    document.getElementById('btn-start').addEventListener('click', triggerFileSelect);

    // --- 清理资源 ---
    function cleanupUrls() {
      allImages.forEach(img => URL.revokeObjectURL(img.url));
      allImages = [];
      currentlyDisplayedUrls.clear();
      activeTimers.forEach(clearTimeout);
      activeTimers = [];
      gallery.innerHTML = '';
    }

    // --- UI 状态切换 ---
    function showScreen(screenId, message = '') {
      statusOverlay.classList.remove('hidden');
      welcomeScreen.classList.add('hidden');
      loadingScreen.classList.add('hidden');
      errorScreen.classList.add('hidden');
      gridContainer.classList.add('hidden');

      if (screenId === 'welcome') welcomeScreen.classList.remove('hidden');
      else if (screenId === 'loading') loadingScreen.classList.remove('hidden', 'flex'); // Flex reset
      else if (screenId === 'error') {
        errorScreen.classList.remove('hidden');
        errorText.textContent = message;
      }
      else if (screenId === 'gallery') {
        statusOverlay.classList.add('hidden');
        gridContainer.classList.remove('hidden');
      }
    }

    // --- 加载单张图片尺寸 ---
    function loadImageData(file) {
      return new Promise((resolve) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => resolve({ id: file.name, name: file.name, url: url, ratio: img.width / img.height });
        img.onerror = () => resolve({ id: file.name, name: file.name, url: url, ratio: 1 });
        img.src = url;
      });
    }

    // --- 处理文件夹选择 ---
    fileInput.addEventListener('change', async (e) => {
      const files = e.target.files;
      if (!files || files.length === 0) return;

      cleanupUrls();
      showScreen('loading');

      try {
        const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'image/svg+xml'];
        const validFiles = Array.from(files)
          .filter(file => validTypes.includes(file.type))
          .slice(0, 300); // 限制处理前 300 张防止浏览器卡死

        if (validFiles.length === 0) {
          throw new Error("在该文件夹中没有找到支持的图片格式。");
        }

        const imageFiles = await Promise.all(validFiles.map(loadImageData));

        // 打乱数组
        for (let i = imageFiles.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [imageFiles[i], imageFiles[j]] = [imageFiles[j], imageFiles[i]];
        }

        allImages = imageFiles;
        buildGrid();
        showScreen('gallery');

      } catch (err) {
        showScreen('error', err.message || "读取文件夹时出错，请重试。");
      } finally {
        fileInput.value = '';
      }
    });

    // --- 构建流光网格 ---
    function buildGrid() {
      const TOTAL_TILES = 150; // 屏幕填充满的坑位数量
      
      for (let i = 0; i < TOTAL_TILES; i++) {
        const img = allImages[i % allImages.length];
        const tile = createTileElement(img);
        gallery.appendChild(tile);
      }
    }

    // --- 创建单个网格元素及交替逻辑 ---
    function createTileElement(initialImg) {
      const wrapper = document.createElement('div');
      wrapper.className = "justified-item group overflow-hidden bg-slate-950/50 cursor-pointer will-change-transform";
      wrapper.style.setProperty('--ratio', initialImg.ratio);

      const imgEl = document.createElement('img');
      imgEl.src = initialImg.url;
      imgEl.alt = initialImg.name;
      imgEl.className = "w-full h-full object-cover transition-all duration-1000 ease-out group-hover:scale-110 group-hover:brightness-110";

      const glint = document.createElement('div');
      glint.className = "absolute inset-0 z-10 pointer-events-none hidden";

      const hoverOverlay = document.createElement('div');
      hoverOverlay.className = "absolute inset-0 bg-gradient-to-t from-black/80 via-black/0 to-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-500 z-20 flex items-center justify-center p-3";
      hoverOverlay.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/80 opacity-0 group-hover:opacity-100 transition-all duration-500 delay-75 transform scale-50 group-hover:scale-100"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></svg>`;

      wrapper.appendChild(imgEl);
      wrapper.appendChild(glint);
      wrapper.appendChild(hoverOverlay);

      let currentImg = initialImg;
      // 记录该图片目前正展示在屏幕上
      currentlyDisplayedUrls.add(currentImg.url);

      // 点击打开灯箱
      wrapper.addEventListener('click', () => openLightbox(currentImg));

      // 动画交替逻辑
      const triggerSwap = () => {
        // 1. 寻找比例相近的图片，防止拉伸或裁剪过度
        const similarImages = allImages.filter(img => Math.abs(img.ratio - currentImg.ratio) < 0.3);
        
        // 2. 【核心优化】：尝试过滤掉那些当前已经在屏幕上的图片，最大程度避免重复
        let pool = similarImages.filter(img => !currentlyDisplayedUrls.has(img.url));
        
        // 3. 如果相册图片很少，过滤后没图了，就退一步，允许重复
        if (pool.length === 0) pool = similarImages;
        if (pool.length === 0) pool = allImages; // 绝对保底

        const nextImg = pool[Math.floor(Math.random() * pool.length)];

        // 开始动画
        imgEl.classList.add('animate-cell-emergence');
        glint.classList.remove('hidden');
        glint.classList.add('glint-effect');

        // 在遮罩或模糊最重的瞬间替换图片资源
        setTimeout(() => {
          currentlyDisplayedUrls.delete(currentImg.url);
          currentImg = nextImg;
          currentlyDisplayedUrls.add(currentImg.url);
          
          imgEl.src = currentImg.url;
          imgEl.alt = currentImg.name;
          wrapper.style.setProperty('--ratio', currentImg.ratio);
        }, 200);

        // 动画结束清理类名
        setTimeout(() => {
          imgEl.classList.remove('animate-cell-emergence');
          glint.classList.add('hidden');
          glint.classList.remove('glint-effect');
        }, 1500);

        // 计划下一次切换
        const nextDelay = Math.random() * 30000 + 15000;
        const timerId = setTimeout(triggerSwap, nextDelay);
        activeTimers.push(timerId);
      };

      // 初始启动随机打散
      const initialDelay = Math.random() * 20000 + 1000;
      const initialTimerId = setTimeout(triggerSwap, initialDelay);
      activeTimers.push(initialTimerId);

      return wrapper;
    }

    // --- 灯箱逻辑 (Lightbox) ---
    function openLightbox(img) {
      selectedIndex = allImages.findIndex(i => i.url === img.url);
      updateLightbox();
      lightbox.classList.remove('hidden');
      lightbox.classList.add('flex');
      // 延迟添加透明度确保动画执行
      setTimeout(() => {
        lightbox.classList.remove('opacity-0');
        lightbox.classList.add('opacity-100');
        lightboxImg.classList.remove('scale-95');
        lightboxImg.classList.add('scale-100');
      }, 10);
    }

    function closeLightbox() {
      selectedIndex = null;
      lightbox.classList.remove('opacity-100');
      lightbox.classList.add('opacity-0');
      lightboxImg.classList.remove('scale-100');
      lightboxImg.classList.add('scale-95');
      setTimeout(() => {
        lightbox.classList.add('hidden');
        lightbox.classList.remove('flex');
      }, 300); // 等待过渡动画结束
    }

    function updateLightbox() {
      if (selectedIndex === null) return;
      const img = allImages[selectedIndex];
      lightboxImg.src = img.url;
      lightboxImg.alt = img.name;
      lightboxTitle.textContent = img.name;
      lightboxCount.textContent = `${selectedIndex + 1} / ${allImages.length}`;
    }

    function prevImage(e) {
      if(e) e.stopPropagation();
      if (selectedIndex !== null) {
        selectedIndex = selectedIndex > 0 ? selectedIndex - 1 : allImages.length - 1;
        updateLightbox();
      }
    }

    function nextImage(e) {
      if(e) e.stopPropagation();
      if (selectedIndex !== null) {
        selectedIndex = selectedIndex < allImages.length - 1 ? selectedIndex + 1 : 0;
        updateLightbox();
      }
    }

    document.getElementById('btn-close-lightbox').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-backdrop').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-img').addEventListener('click', (e) => e.stopPropagation());
    document.getElementById('btn-prev-lightbox').addEventListener('click', prevImage);
    document.getElementById('btn-next-lightbox').addEventListener('click', nextImage);

    window.addEventListener('keydown', (e) => {
      if (selectedIndex === null) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') prevImage();
      else if (e.key === 'ArrowRight') nextImage();
    });

  </script>
</body>
</html>
