<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XIANG FRAME</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23000000' stroke-width='1.5' stroke-linecap='square' stroke-linejoin='miter'%3E%3Cline x1='22' x2='2' y1='6' y2='6'/%3E%3Cline x1='22' x2='2' y1='18' y2='18'/%3E%3Cline x1='6' x2='6' y1='2' y2='22'/%3E%3Cline x1='18' x2='18' y1='2' y2='22'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Noto+Serif+SC:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"Helvetica Neue"', '"PingFang SC"', 'sans-serif'],
                        serif: ['Playfair Display', 'Noto Serif SC', 'Songti SC', 'serif'],
                        cinzel: ['Cinzel', 'Noto Serif SC', 'serif'],
                        mono: ['JetBrains Mono', 'Courier New', 'monospace'],
                    },
                    colors: {
                        brand: '#000000',
                        surface: '#ffffff',
                        background: '#f8f8f8',
                        zinc: {
                            50: '#fafafa',
                            100: '#f4f4f5',
                            200: '#e4e4e7',
                            300: '#d4d4d8',
                            400: '#a1a1aa',
                            500: '#71717a',
                            800: '#27272a',
                            900: '#18181b',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-out forwards',
                        'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e4e4e7; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        body { 
            background-color: theme('colors.background'); 
            -webkit-font-smoothing: antialiased; 
            text-rendering: optimizeLegibility;
        }
        
        .canvas-wrapper {
            background-color: #f0f0f0;
            background-image: linear-gradient(45deg, #e8e8e8 25%, transparent 25%, transparent 75%, #e8e8e8 75%, #e8e8e8), linear-gradient(45deg, #e8e8e8 25%, transparent 25%, transparent 75%, #e8e8e8 75%, #e8e8e8);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: 0 24px 40px -12px rgba(0, 0, 0, 0.15);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .file-input-hidden { display: none; }
        
        .drag-active {
            border-color: #000 !important;
            background-color: #f8f8f8 !important;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 4px;
            background: #000;
            cursor: pointer;
            margin-top: -6px;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scaleY(1.3); }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: #e4e4e7;
        }

        @keyframes lineProgress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-line {
            animation: lineProgress 1.5s infinite cubic-bezier(0.65, 0, 0.35, 1);
        }

        .toast-enter { animation: toast-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-leave { animation: toast-out 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes toast-in { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes toast-out { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(100%); opacity: 0; } }

        .form-input {
            border-radius: 0;
            border: 1px solid #e4e4e7;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            border-color: #000;
            box-shadow: none;
            outline: none;
        }
    </style>
</head>
<body class="text-black h-[100dvh] flex flex-col overflow-hidden font-sans">

    <!-- 全局启动动画 -->
    <div id="initialLoader" class="fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="flex flex-col items-center animate-slide-up">
            <h1 class="font-sans font-light text-3xl tracking-wide mb-6 text-black">FRAME</h1>
            <div class="w-24 h-[1px] bg-zinc-200 overflow-hidden relative">
                <div class="absolute inset-y-0 left-0 w-full bg-black animate-line"></div>
            </div>
            <p class="mt-4 text-[11px] tracking-widest text-zinc-400">加载中...</p>
        </div>
    </div>

    <!-- 处理进度浮层 -->
    <div id="processingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-md z-[100] flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500">
        <h2 class="font-sans font-light text-2xl tracking-wide mb-6 text-black">Processing</h2>
        <div class="w-32 h-[1px] bg-zinc-200 overflow-hidden relative mb-4">
            <div class="absolute inset-y-0 left-0 w-full bg-black animate-line"></div>
        </div>
        <p id="uploadProgressText" class="text-[11px] tracking-widest text-black">正在分析光学参数...</p>
    </div>

    <header class="bg-white border-b border-zinc-200 h-14 md:h-[68px] flex items-center justify-between px-5 md:px-8 shrink-0 z-20 relative">
        <div class="flex items-baseline gap-2.5">
            <h1 class="font-sans font-medium text-xl tracking-wide">FRAME</h1>
            <span class="hidden sm:inline-block text-[10px] uppercase tracking-widest text-zinc-400">1.5</span>
        </div>
        <div class="flex items-center gap-3">
            <button id="batchDownloadBtn" class="hidden items-center gap-2 bg-transparent border border-zinc-200 hover:border-black text-black px-4 py-2 text-xs font-medium transition-colors">
                <i data-lucide="layers" class="w-3.5 h-3.5"></i>
                <span class="hidden sm:inline">批量打包 (ZIP)</span>
                <span class="sm:hidden">打包</span>
            </button>
            <button id="downloadBtn" class="hidden items-center gap-2 bg-black hover:bg-zinc-800 text-white px-5 py-2 text-xs font-medium transition-colors">
                <i data-lucide="download" class="w-3.5 h-3.5"></i>
                <span>保存照片</span>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
        <section class="order-1 lg:order-2 h-[45vh] lg:h-auto lg:flex-1 shrink-0 canvas-wrapper flex flex-col relative overflow-hidden border-b lg:border-b-0 lg:border-l border-zinc-200">
            <div id="emptyPreview" class="absolute inset-0 flex flex-col items-center justify-center text-zinc-400 z-0 pointer-events-none transition-opacity duration-300">
                <i data-lucide="image-plus" class="w-10 h-10 text-zinc-300 mb-5 font-light"></i>
                <p class="text-xs tracking-widest text-zinc-500">将照片拖拽至此处</p>
            </div>
            
            <div id="canvasContainer" class="flex-1 w-full h-full min-h-0 p-8 md:p-16 flex items-center justify-center overflow-hidden z-10">
                <canvas id="mainCanvas" class="hidden"></canvas>
            </div>

            <div id="galleryContainer" class="hidden w-full h-20 shrink-0 bg-white border-t border-zinc-200 items-center px-6 overflow-x-auto hide-scrollbar z-20">
                <div id="thumbnailList" class="flex gap-4 h-full items-center py-2">
                </div>
            </div>
        </section>

        <aside class="order-2 lg:order-1 w-full lg:w-[400px] xl:w-[420px] bg-white overflow-y-auto flex-1 lg:flex-none z-10">
            <div class="p-6 md:p-8 space-y-8">
                
                <section>
                    <div id="dropZone" class="border border-dashed border-zinc-300 bg-zinc-50/50 p-8 text-center cursor-pointer hover:bg-zinc-100 transition-colors duration-300 group">
                        <input type="file" id="fileInput" class="file-input-hidden" multiple accept="image/jpeg, image/png, image/webp, image/heic">
                        <i data-lucide="plus" class="w-5 h-5 text-zinc-400 mx-auto mb-3 group-hover:text-black transition-colors"></i>
                        <h3 class="text-xs tracking-wider font-medium text-black mb-1">添加照片</h3>
                    </div>
                </section>

                <div id="settingsPanel" class="space-y-8 opacity-30 pointer-events-none transition-all duration-500">
                    
                    <section class="border-b border-zinc-100 pb-8">
                        <div class="flex items-center justify-between mb-5">
                            <h2 class="text-xs tracking-wider text-zinc-400 font-medium">参数信息</h2>
                            <button id="autoExifBtn" class="text-xs flex items-center gap-1 text-zinc-400 hover:text-black transition-colors">
                                <i data-lucide="refresh-cw" class="w-3 h-3"></i> 重置
                            </button>
                        </div>
                        
                        <div class="mb-5">
                            <div class="flex border border-zinc-200 p-0.5 bg-zinc-50">
                                <button class="segment-btn preset-btn flex-1 py-1.5 text-xs tracking-wider font-medium bg-black text-white transition-colors" data-preset="params">专业参数</button>
                                <button class="segment-btn preset-btn flex-1 py-1.5 text-xs tracking-wider font-medium text-zinc-500 hover:text-black bg-transparent transition-colors" data-preset="coords">地理位置</button>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs tracking-wider text-zinc-500 mb-2">主文本 (设备/标题)</label>
                                <input type="text" id="mainText" class="w-full px-3 py-2 form-input bg-transparent text-sm text-black placeholder-zinc-300">
                            </div>
                            <div>
                                <label class="block text-xs tracking-wider text-zinc-500 mb-2">副文本 (光学/描述)</label>
                                <input type="text" id="subText" class="w-full px-3 py-2 form-input bg-transparent text-sm text-black placeholder-zinc-300">
                            </div>
                        </div>
                    </section>

                    <section class="pb-4">
                        <h2 class="text-xs tracking-wider text-zinc-400 font-medium mb-5">视觉排版</h2>
                        
                        <div class="space-y-7">
                            <div>
                                <label class="text-xs tracking-wider text-black mb-2.5 block">相框模版</label>
                                <div class="grid grid-cols-3 gap-2">
                                    <button class="segment-btn style-btn py-2 border border-zinc-200 text-[11px] tracking-wider font-medium bg-black text-white transition-colors" data-style="classic">极简留白</button>
                                    <button class="segment-btn style-btn py-2 border border-zinc-200 text-[11px] tracking-wider font-medium text-zinc-500 hover:border-black hover:text-black bg-transparent transition-colors" data-style="film">真实胶片</button>
                                    <button class="segment-btn style-btn py-2 border border-zinc-200 text-[11px] tracking-wider font-medium text-zinc-500 hover:border-black hover:text-black bg-transparent transition-colors" data-style="cinematic">宽幅电影</button>
                                    <button class="segment-btn style-btn py-2 border border-zinc-200 text-[11px] tracking-wider font-medium text-zinc-500 hover:border-black hover:text-black bg-transparent transition-colors" data-style="glass">高级毛玻璃</button>
                                    <button class="segment-btn style-btn py-2 border border-zinc-200 text-[11px] tracking-wider font-medium text-zinc-500 hover:border-black hover:text-black bg-transparent transition-colors" data-style="palette">色彩卡片</button>
                                    <button class="segment-btn style-btn py-2 border border-zinc-200 text-[11px] tracking-wider font-medium text-zinc-500 hover:border-black hover:text-black bg-transparent transition-colors" data-style="museum">画廊美术馆</button>
                                </div>
                            </div>

                            <div>
                                <label class="text-xs tracking-wider text-black mb-2.5 block">文字布局</label>
                                <div class="flex border border-zinc-200 p-0.5 bg-zinc-50" id="layoutGroup">
                                    <button class="segment-btn layout-btn flex-1 py-1.5 text-[11px] tracking-wider font-medium bg-black text-white transition-colors" data-layout="center">居中对齐</button>
                                    <button class="segment-btn layout-btn flex-1 py-1.5 text-[11px] tracking-wider font-medium text-zinc-500 hover:text-black bg-transparent transition-colors" data-layout="split">两端分布</button>
                                    <button class="segment-btn layout-btn flex-1 py-1.5 text-[11px] tracking-wider font-medium text-zinc-500 hover:text-black bg-transparent transition-colors" data-layout="inline">紧凑单行</button>
                                </div>
                            </div>

                            <div>
                                <div class="flex justify-between items-center mb-3">
                                    <label class="text-xs tracking-wider text-black">边距比例</label>
                                    <span id="borderWidthLabel" class="text-xs font-mono text-zinc-500">6%</span>
                                </div>
                                <input type="range" id="borderWidth" min="2" max="25" value="6" class="w-full">
                            </div>

                            <div>
                                <label class="text-xs tracking-wider text-black mb-2.5 block">英文字体引擎</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <button class="segment-btn font-btn py-2 border border-zinc-200 text-[11px] tracking-wider font-medium bg-black text-white transition-colors" style="font-family: -apple-system, 'SF Pro Text', sans-serif;" data-font="system">Apple 原生无衬线</button>
                                    <button class="segment-btn font-btn py-2 border border-zinc-200 text-[11px] tracking-wider font-medium text-zinc-500 hover:border-black hover:text-black bg-transparent transition-colors" style="font-family: 'Playfair Display', 'Noto Serif SC', serif;" data-font="serif">优雅衬线体</button>
                                    <button class="segment-btn font-btn py-2 border border-zinc-200 text-[11px] tracking-wider font-medium text-zinc-500 hover:border-black hover:text-black bg-transparent transition-colors" style="font-family: 'Cinzel', 'Noto Serif SC', serif;" data-font="cinzel">Cinzel 罗马字</button>
                                    <button class="segment-btn font-btn py-2 border border-zinc-200 text-[11px] tracking-wider font-medium text-zinc-500 hover:border-black hover:text-black bg-transparent transition-colors" style="font-family: 'JetBrains Mono', monospace;" data-font="mono">机能等宽</button>
                                </div>
                            </div>

                            <div>
                                <label class="text-xs tracking-wider text-black mb-2.5 block">环境色调</label>
                                <div class="flex gap-2">
                                    <label class="flex-1 relative cursor-pointer group">
                                        <input type="radio" name="theme" value="light" checked class="peer sr-only">
                                        <div class="flex items-center justify-center py-2.5 border border-zinc-200 bg-white text-black peer-checked:border-black peer-checked:bg-black peer-checked:text-white transition-colors text-[11px] tracking-wider font-medium">
                                            明亮系 (Light)
                                        </div>
                                    </label>
                                    <label class="flex-1 relative cursor-pointer group">
                                        <input type="radio" name="theme" value="dark" class="peer sr-only">
                                        <div class="flex items-center justify-center py-2.5 border border-zinc-200 bg-white text-zinc-500 peer-checked:border-black peer-checked:bg-black peer-checked:text-white transition-colors text-[11px] tracking-wider font-medium hover:text-black">
                                            暗黑系 (Dark)
                                        </div>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
                
                <div class="pt-8 text-center border-t border-zinc-100">
                    <p class="font-sans font-medium text-xs text-zinc-400 mb-1">XIANG VISUALS.</p>
                    <p class="text-[10px] text-zinc-400 tracking-widest">
                        本地浏览器处理，保护隐私 &copy; 2026
                    </p>
                </div>
            </div>
        </aside>
    </main>

    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-2 pointer-events-none"></div>

    <script>
        lucide.createIcons();

        window.addEventListener('load', () => {
            const loader = document.getElementById('initialLoader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 1000);
            }, 1200);
        });

        class FrameGenerator {
            constructor() {
                this.state = {
                    images: [],
                    currentIndex: -1,
                    config: {
                        preset: 'params',
                        borderRatio: 0.06, 
                        fontFamily: 'system',
                        theme: 'light',
                        frameStyle: 'classic',
                        textLayout: 'center'
                    }
                };
                
                this.initDOM();
                this.bindEvents();
            }

            initDOM() {
                this.dom = {
                    fileInput: document.getElementById('fileInput'),
                    dropZone: document.getElementById('dropZone'),
                    processingOverlay: document.getElementById('processingOverlay'),
                    uploadProgressText: document.getElementById('uploadProgressText'),
                    settingsPanel: document.getElementById('settingsPanel'),
                    mainText: document.getElementById('mainText'),
                    subText: document.getElementById('subText'),
                    presetBtns: document.querySelectorAll('.preset-btn'),
                    styleBtns: document.querySelectorAll('.style-btn'),
                    layoutBtns: document.querySelectorAll('.layout-btn'),
                    borderWidth: document.getElementById('borderWidth'),
                    borderWidthLabel: document.getElementById('borderWidthLabel'),
                    fontBtns: document.querySelectorAll('.font-btn'),
                    themeRadios: document.querySelectorAll('input[name="theme"]'),
                    canvasContainer: document.getElementById('canvasContainer'),
                    canvas: document.getElementById('mainCanvas'),
                    ctx: document.getElementById('mainCanvas').getContext('2d'),
                    emptyPreview: document.getElementById('emptyPreview'),
                    
                    downloadBtn: document.getElementById('downloadBtn'),
                    batchDownloadBtn: document.getElementById('batchDownloadBtn'),
                    
                    autoExifBtn: document.getElementById('autoExifBtn'),
                    galleryContainer: document.getElementById('galleryContainer'),
                    thumbnailList: document.getElementById('thumbnailList'),
                    toastContainer: document.getElementById('toastContainer')
                };
            }

            updateSegmentedUI(buttons, activeDataKey, activeValue) {
                buttons.forEach(btn => {
                    if (btn.dataset[activeDataKey] === activeValue) {
                        btn.classList.remove('text-zinc-500', 'hover:text-black', 'bg-transparent', 'hover:border-black');
                        btn.classList.add('bg-black', 'text-white');
                        if (btn.classList.contains('border')) btn.classList.add('border-black');
                    } else {
                        btn.classList.remove('bg-black', 'text-white', 'border-black');
                        btn.classList.add('text-zinc-500', 'hover:text-black', 'bg-transparent');
                        if (btn.classList.contains('border')) btn.classList.add('border-zinc-200', 'hover:border-black');
                    }
                });
            }

            bindEvents() {
                this.dom.dropZone.addEventListener('click', () => this.dom.fileInput.click());
                this.dom.fileInput.addEventListener('change', (e) => this.handleFiles(e.target.files));
                
                ['dragover', 'dragenter'].forEach(evt => {
                    this.dom.dropZone.addEventListener(evt, (e) => {
                        e.preventDefault();
                        this.dom.dropZone.classList.add('drag-active');
                    });
                });
                ['dragleave', 'dragend', 'drop'].forEach(evt => {
                    this.dom.dropZone.addEventListener(evt, (e) => {
                        e.preventDefault();
                        this.dom.dropZone.classList.remove('drag-active');
                        if (evt === 'drop' && e.dataTransfer.files.length) {
                            this.handleFiles(e.dataTransfer.files);
                        }
                    });
                });

                const scheduleRender = () => {
                    if (this.renderTimer) cancelAnimationFrame(this.renderTimer);
                    this.renderTimer = requestAnimationFrame(() => this.renderCurrentCanvas());
                };

                this.dom.mainText.addEventListener('input', (e) => { 
                    if(this.state.currentIndex >= 0) {
                        this.state.images[this.state.currentIndex].mainText = e.target.value; 
                        scheduleRender(); 
                    }
                });
                this.dom.subText.addEventListener('input', (e) => { 
                    if(this.state.currentIndex >= 0) {
                        this.state.images[this.state.currentIndex].subText = e.target.value; 
                        scheduleRender(); 
                    }
                });
                
                this.dom.presetBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const val = e.currentTarget.dataset.preset;
                        this.updateSegmentedUI(this.dom.presetBtns, 'preset', val);
                        this.state.config.preset = val;
                        
                        if (val === 'coords' || ['palette', 'museum', 'film', 'cinematic'].includes(this.state.config.frameStyle)) {
                            this.dom.layoutBtns.forEach(b => { b.style.pointerEvents = 'none'; b.style.opacity = '0.3'; });
                        } else {
                            this.dom.layoutBtns.forEach(b => { b.style.pointerEvents = 'auto'; b.style.opacity = '1'; });
                        }

                        this.state.images.forEach(imgData => this.generateTextForImage(imgData));
                        this.syncInputsWithCurrent();
                        scheduleRender();
                    });
                });

                this.dom.styleBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const val = e.currentTarget.dataset.style;
                        this.updateSegmentedUI(this.dom.styleBtns, 'style', val);
                        this.state.config.frameStyle = val;
                        
                        if (['palette', 'museum', 'film', 'cinematic'].includes(val) || this.state.config.preset === 'coords') {
                            this.dom.layoutBtns.forEach(b => { b.style.pointerEvents = 'none'; b.style.opacity = '0.3'; });
                        } else {
                            this.dom.layoutBtns.forEach(b => { b.style.pointerEvents = 'auto'; b.style.opacity = '1'; });
                        }
                        
                        scheduleRender();
                    });
                });

                this.dom.layoutBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const val = e.currentTarget.dataset.layout;
                        this.updateSegmentedUI(this.dom.layoutBtns, 'layout', val);
                        this.state.config.textLayout = val;
                        scheduleRender();
                    });
                });

                this.dom.borderWidth.addEventListener('input', (e) => {
                    const val = e.target.value;
                    this.dom.borderWidthLabel.textContent = `${val}%`;
                    this.state.config.borderRatio = parseInt(val) / 100;
                    scheduleRender();
                });
                
                this.dom.fontBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const val = e.currentTarget.dataset.font;
                        this.updateSegmentedUI(this.dom.fontBtns, 'font', val);
                        this.state.config.fontFamily = val;
                        scheduleRender();
                    });
                });
                
                this.dom.themeRadios.forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        this.state.config.theme = e.target.value;
                        scheduleRender();
                    });
                });

                this.dom.autoExifBtn.addEventListener('click', () => {
                    if(this.state.currentIndex >= 0) {
                        this.generateTextForImage(this.state.images[this.state.currentIndex]);
                        this.syncInputsWithCurrent();
                        scheduleRender();
                        this.showToast('元数据已重置', 'info');
                    }
                });

                this.dom.downloadBtn.addEventListener('click', () => this.downloadCurrentImage());
                this.dom.batchDownloadBtn.addEventListener('click', () => this.batchDownload());
            }

            extractColors(img, count = 5) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxSize = 100; 
                
                let w = img.naturalWidth;
                let h = img.naturalHeight;
                if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                else { w = Math.round(w * maxSize / h); h = maxSize; }

                canvas.width = w;
                canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                
                let data;
                try {
                    data = ctx.getImageData(0, 0, w, h).data;
                } catch(e) {
                    return ['#111111', '#333333', '#555555', '#777777', '#999999'];
                }

                let pixels = [];
                for(let i=0; i<data.length; i+=4) {
                    if(data[i+3] >= 200) { 
                        pixels.push([data[i], data[i+1], data[i+2]]);
                    }
                }
                if (pixels.length === 0) return ['#111111', '#333333', '#555555', '#777777', '#999999'];

                let centroids = [pixels[Math.floor(Math.random() * pixels.length)]];
                for (let i = 1; i < count; i++) {
                    let maxDist = -1;
                    let nextCentroid = pixels[0];
                    for (let p of pixels) {
                        let minDist = Infinity;
                        for (let c of centroids) {
                            let d = Math.pow(p[0]-c[0], 2) + Math.pow(p[1]-c[1], 2) + Math.pow(p[2]-c[2], 2);
                            if (d < minDist) minDist = d;
                        }
                        if (minDist > maxDist) {
                            maxDist = minDist;
                            nextCentroid = p;
                        }
                    }
                    centroids.push(nextCentroid);
                }

                for(let iter=0; iter<10; iter++) {
                    let clusters = Array.from({length: count}, () => []);
                    for(let p of pixels) {
                        let minDist = Infinity;
                        let bestIdx = 0;
                        for(let i=0; i<count; i++) {
                            let c = centroids[i];
                            let d = Math.pow(p[0]-c[0], 2) + Math.pow(p[1]-c[1], 2) + Math.pow(p[2]-c[2], 2);
                            if(d < minDist) { minDist = d; bestIdx = i; }
                        }
                        clusters[bestIdx].push(p);
                    }
                    
                    let moved = false;
                    for(let i=0; i<count; i++) {
                        if(clusters[i].length > 0) {
                            let r=0, g=0, b=0;
                            for(let p of clusters[i]) { r+=p[0]; g+=p[1]; b+=p[2]; }
                            let newC = [Math.round(r/clusters[i].length), Math.round(g/clusters[i].length), Math.round(b/clusters[i].length)];
                            if (newC[0]!==centroids[i][0] || newC[1]!==centroids[i][1] || newC[2]!==centroids[i][2]) {
                                moved = true;
                                centroids[i] = newC;
                            }
                        }
                    }
                    if (!moved) break;
                }

                centroids.sort((a,b) => {
                    let lumaA = 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
                    let lumaB = 0.2126 * b[0] + 0.7152 * b[1] + 0.0722 * b[2];
                    return lumaA - lumaB; 
                });

                const rgbToHex = (c) => '#' + c.map(x => {
                    const hex = x.toString(16);
                    return hex.length === 1 ? '0' + hex : hex;
                }).join('');

                return centroids.map(rgbToHex);
            }

            async handleFiles(filesList) {
                if (!filesList || filesList.length === 0) return;
                
                const validFiles = Array.from(filesList).filter(f => 
                    f.type.startsWith('image/') || f.name.toLowerCase().match(/\.(jpg|jpeg|png|webp|heic)$/)
                );

                if (validFiles.length === 0) {
                    this.showToast('不支持的图片格式', 'error');
                    return;
                }

                this.setLoading(true, `正在准备 ${validFiles.length} 张照片...`);

                let successCount = 0;
                for (let i = 0; i < validFiles.length; i++) {
                    const file = validFiles[i];
                    this.setLoading(true, `正在分析 (${i+1}/${validFiles.length})`);
                    try {
                        const [imgElement, exifData] = await Promise.all([
                            this.loadImage(file),
                            this.readExif(file)
                        ]);
                        
                        const colors = this.extractColors(imgElement, 5);
                        const gpsStr = this.formatGPS(e => exifData.lat, e => exifData.latRef, e => exifData.lng, e => exifData.lngRef);
                        const dateTimeStr = this.formatExifDate(exifData.dateTime);

                        const imgData = {
                            id: Date.now() + Math.random().toString(36).substr(2, 5),
                            file: file,
                            objectUrl: imgElement.src,
                            img: imgElement,
                            exifData: exifData,
                            mainText: '',
                            subText: '',
                            colors: colors,
                            gpsStr: gpsStr,
                            dateTimeStr: dateTimeStr
                        };
                        
                        this.generateTextForImage(imgData);
                        this.state.images.push(imgData);
                        successCount++;
                    } catch (error) {
                        console.error(`解析失败: ${file.name}`, error);
                    }
                }

                this.setLoading(false);
                this.dom.fileInput.value = '';

                if (successCount > 0) {
                    this.dom.settingsPanel.classList.remove('opacity-30', 'pointer-events-none');
                    this.dom.emptyPreview.classList.add('hidden');
                    this.dom.canvas.classList.remove('hidden');
                    
                    this.dom.downloadBtn.classList.remove('hidden');
                    this.dom.downloadBtn.classList.add('flex');
                    
                    if (this.state.images.length > 1) {
                        this.dom.batchDownloadBtn.classList.remove('hidden');
                        this.dom.batchDownloadBtn.classList.add('flex');
                        
                        this.dom.galleryContainer.classList.remove('hidden');
                        this.dom.galleryContainer.classList.add('flex');
                    } else {
                        this.dom.galleryContainer.classList.add('hidden');
                        this.dom.galleryContainer.classList.remove('flex');
                    }

                    this.renderGallery();
                    this.selectImage(this.state.images.length - successCount);
                    this.showToast(`成功载入 ${successCount} 张照片`, 'success');
                } else {
                    this.showToast('导入失败', 'error');
                }
            }

            loadImage(file) {
                return new Promise((resolve, reject) => {
                    const url = URL.createObjectURL(file);
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => { URL.revokeObjectURL(url); reject(); };
                    img.src = url;
                });
            }

            readExif(file) {
                return new Promise((resolve) => {
                    EXIF.getData(file, function() {
                        const data = {
                            make: EXIF.getTag(this, "Make"),
                            model: EXIF.getTag(this, "Model"),
                            focalLength: EXIF.getTag(this, "FocalLength"),
                            focalLength35mm: EXIF.getTag(this, "FocalLengthIn35mmFilm"), 
                            fNumber: EXIF.getTag(this, "FNumber"),
                            exposureTime: EXIF.getTag(this, "ExposureTime"),
                            iso: EXIF.getTag(this, "ISOSpeedRatings"),
                            lat: EXIF.getTag(this, "GPSLatitude"),
                            latRef: EXIF.getTag(this, "GPSLatitudeRef"),
                            lng: EXIF.getTag(this, "GPSLongitude"),
                            lngRef: EXIF.getTag(this, "GPSLongitudeRef"),
                            dateTime: EXIF.getTag(this, "DateTimeOriginal") || EXIF.getTag(this, "DateTime")
                        };
                        resolve(data);
                    });
                });
            }

            formatExifDate(str) {
                if(!str) return '';
                const parts = str.split(' ');
                if(parts.length < 1) return str;
                
                const dateParts = parts[0].split(':');
                if(dateParts.length === 3) {
                    const y = dateParts[0];
                    const m = dateParts[1];
                    const d = dateParts[2];
                    const timePart = parts[1] ? parts[1] : '';
                    return timePart ? `${y}-${m}-${d} ${timePart}` : `${y}-${m}-${d}`;
                }
                return str;
            }

            generateTextForImage(imgData) {
                const e = imgData.exifData;
                if (!e) return;
                
                let main = '';
                let sub = '';

                if (this.state.config.preset === 'coords') {
                    if (e.lat && e.lng) {
                        main = this.formatGPS(e.lat, e.latRef, e.lng, e.lngRef);
                    } else {
                        main = 'XIANG VISUALS';
                    }
                    sub = '';
                } else {
                    if (e.model) {
                        main = e.make && e.model.indexOf(e.make) === -1 ? `${e.make} ${e.model}` : e.model;
                    } else if (e.lat && e.lng) {
                        main = this.formatGPS(e.lat, e.latRef, e.lng, e.lngRef);
                    } else {
                        main = 'XIANG VISUALS';
                    }

                    const params = [];
                    if (e.focalLength35mm) {
                        params.push(`${Math.round(e.focalLength35mm)}mm`);
                    } else if (e.focalLength) {
                        const fl = e.focalLength.numerator ? e.focalLength.numerator / e.focalLength.denominator : e.focalLength;
                        params.push(`${Math.round(fl)}mm`);
                    }
                    
                    if (e.fNumber) {
                        const fn = e.fNumber.numerator ? e.fNumber.numerator / e.fNumber.denominator : e.fNumber;
                        params.push(`f/${fn.toFixed(1)}`);
                    }
                    if (e.exposureTime) {
                        let etVal = e.exposureTime;
                        if (e.exposureTime.numerator) {
                            etVal = e.exposureTime.numerator / e.exposureTime.denominator;
                        }
                        if(typeof etVal === 'number' && etVal > 0 && etVal < 1) {
                            params.push(`1/${Math.round(1/etVal)}s`);
                        } else {
                            params.push(`${etVal}s`);
                        }
                    }
                    if (e.iso) params.push(`ISO${e.iso}`);
                    sub = params.join('   ');
                }

                imgData.mainText = main;
                imgData.subText = sub;
            }

            formatGPS(lat, latRef, lng, lngRef) {
                try {
                    const formatDMS = (dms) => {
                        const d = dms[0].numerator ? dms[0].numerator / dms[0].denominator : dms[0];
                        const m = dms[1].numerator ? dms[1].numerator / dms[1].denominator : dms[1];
                        const s = dms[2].numerator ? dms[2].numerator / dms[2].denominator : dms[2];
                        return `${Math.floor(d)}°${Math.floor(m)}'${s.toFixed(2)}"`; 
                    };
                    return `${formatDMS(lat)}${latRef || 'N'}, ${formatDMS(lng)}${lngRef || 'E'}`;
                } catch(err) { return ''; }
            }

            renderGallery() {
                this.dom.thumbnailList.innerHTML = '';
                this.state.images.forEach((imgData, index) => {
                    const wrap = document.createElement('div');
                    wrap.className = `w-12 h-12 shrink-0 overflow-hidden cursor-pointer transition-all ${index === this.state.currentIndex ? 'border-2 border-black opacity-100' : 'border border-transparent opacity-40 hover:opacity-100'}`;
                    wrap.onclick = () => this.selectImage(index);
                    const img = document.createElement('img');
                    img.src = imgData.objectUrl;
                    img.className = 'w-full h-full object-cover';
                    wrap.appendChild(img);
                    this.dom.thumbnailList.appendChild(wrap);
                });
            }

            selectImage(index) {
                if (index < 0 || index >= this.state.images.length) return;
                this.state.currentIndex = index;
                this.renderGallery();
                this.syncInputsWithCurrent();
                this.renderCurrentCanvas();
                const activeThumb = this.dom.thumbnailList.children[index];
                if (activeThumb) {
                    activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }

            syncInputsWithCurrent() {
                const cur = this.state.images[this.state.currentIndex];
                if(cur) {
                    this.dom.mainText.value = cur.mainText;
                    this.dom.subText.value = cur.subText;
                }
            }

            renderCurrentCanvas() {
                if(this.state.currentIndex < 0) return;
                const imgData = this.state.images[this.state.currentIndex];
                this.drawCanvas(imgData, this.dom.canvas, this.dom.ctx);
            }

            drawCanvas(imgData, canvas, ctx) {
                const img = imgData.img;
                const { config } = this.state;

                const MAX_SIZE = 4096;
                let drawW = img.naturalWidth;
                let drawH = img.naturalHeight;
                if (drawW > MAX_SIZE || drawH > MAX_SIZE) {
                    const ratio = Math.min(MAX_SIZE / drawW, MAX_SIZE / drawH);
                    drawW = Math.floor(drawW * ratio);
                    drawH = Math.floor(drawH * ratio);
                }

                const shortSide = Math.min(drawW, drawH);
                const hasText = imgData.mainText || imgData.subText;
                const basePadding = shortSide * config.borderRatio;
                
                let padTop = 0, padBottom = 0, padLeft = 0, padRight = 0;
                let outerMargin = 0; 
                let finalCanvasWidth = 0, finalCanvasHeight = 0;

                // --- 修改后的宽幅电影裁剪逻辑 ---
                if (config.frameStyle === 'cinematic') {
                    // 1. 设置最终画布为 2.35:1 比例
                    finalCanvasWidth = drawW; // 以图片宽度作为画布宽度基准
                    finalCanvasHeight = finalCanvasWidth / 2.35;

                    // 2. 设定内边距（用于放置文字和留白）
                    const tempPadTop = basePadding * 1.2;
                    const tempPadBottom = hasText ? basePadding * 3.2 : basePadding * 1.2;
                    const tempPadSide = basePadding * 0.8;

                    // 3. 计算图片在画布中实际占据的区域尺寸
                    const targetDrawW = finalCanvasWidth - (tempPadSide * 2);
                    const targetDrawH = finalCanvasHeight - (tempPadTop + tempPadBottom);

                    // 4. 应用这些参数
                    padTop = tempPadTop;
                    padBottom = tempPadBottom;
                    padLeft = tempPadSide;
                    padRight = tempPadSide;
                    
                    // 保存当前的 drawW/drawH 给 drawImage 使用
                    drawW = targetDrawW;
                    drawH = targetDrawH;
                } 
                else if (config.frameStyle === 'palette') {
                    padTop = basePadding * 1.8;
                    padBottom = basePadding * 3.0;
                    padLeft = padRight = basePadding * 1.2;
                } 
                else if (config.frameStyle === 'museum') {
                    padTop = padLeft = padRight = basePadding * 1.2;
                    padBottom = basePadding * 4.0; 
                } 
                else if (config.frameStyle === 'film') {
                    padTop = padBottom = basePadding * 3.0;
                    padLeft = padRight = basePadding * 1.5;
                } 
                else {
                    padTop = padLeft = padRight = basePadding;
                    padBottom = hasText ? basePadding * 2.8 : basePadding;
                }

                if (config.frameStyle !== 'cinematic') {
                    finalCanvasWidth = drawW + padLeft + padRight + outerMargin * 2;
                    finalCanvasHeight = drawH + padTop + padBottom + outerMargin * 2;
                }
                
                canvas.width = finalCanvasWidth;
                canvas.height = finalCanvasHeight;

                const isDark = config.theme === 'dark';
                let bgColor = isDark ? '#0a0a0a' : '#ffffff';
                let textColor = isDark ? '#ffffff' : '#000000';
                let subTextColor = isDark ? '#888888' : '#777777';

                if (config.frameStyle === 'film') {
                    bgColor = '#0f0f0f'; 
                    textColor = '#f39c12'; 
                    subTextColor = '#b9770e';
                } else if (config.frameStyle === 'cinematic') {
                    bgColor = '#000000'; 
                    textColor = '#ffffff';
                    subTextColor = '#888888';
                } else if (config.frameStyle === 'museum') {
                    bgColor = isDark ? '#141414' : '#fdfdfd';
                }

                // 渲染底图背景
                if (config.frameStyle === 'glass') {
                    ctx.save();
                    const MINI_SIZE = 120; 
                    const downScale = Math.min(1, MINI_SIZE / Math.max(canvas.width, canvas.height));
                    const w = Math.max(1, Math.floor(canvas.width * downScale));
                    const h = Math.max(1, Math.floor(canvas.height * downScale));
                    const miniCanvas = document.createElement('canvas');
                    miniCanvas.width = w;
                    miniCanvas.height = h;
                    const miniCtx = miniCanvas.getContext('2d');
                    const scale = Math.max(w / img.naturalWidth, h / img.naturalHeight) * 1.1; 
                    const bgW = img.naturalWidth * scale;
                    const bgH = img.naturalHeight * scale;
                    const bgX = (w - bgW) / 2;
                    const bgY = (h - bgH) / 2;
                    miniCtx.drawImage(img, bgX, bgY, bgW, bgH);
                    const imgDataObj = miniCtx.getImageData(0, 0, w, h);
                    const data = imgDataObj.data;
                    const temp = new Uint8ClampedArray(data.length);
                    const radius = 6;
                    for (let pass = 0; pass < 2; pass++) {
                        for (let y = 0; y < h; y++) {
                            for (let x = 0; x < w; x++) {
                                let r = 0, g = 0, b = 0, count = 0;
                                for (let k = -radius; k <= radius; k++) {
                                    let nx = x + k;
                                    if (nx < 0) nx = 0; else if (nx >= w) nx = w - 1;
                                    const idx = (y * w + nx) * 4;
                                    r += data[idx]; g += data[idx+1]; b += data[idx+2];
                                    count++;
                                }
                                const outIdx = (y * w + x) * 4;
                                temp[outIdx] = r / count; temp[outIdx+1] = g / count; temp[outIdx+2] = b / count; temp[outIdx+3] = 255;
                            }
                        }
                        for (let x = 0; x < w; x++) {
                            for (let y = 0; y < h; y++) {
                                let r = 0, g = 0, b = 0, count = 0;
                                for (let k = -radius; k <= radius; k++) {
                                    let ny = y + k;
                                    if (ny < 0) ny = 0; else if (ny >= h) ny = h - 1;
                                    const idx = (ny * w + x) * 4;
                                    r += temp[idx]; g += temp[idx+1]; b += temp[idx+2];
                                    count++;
                                }
                                const outIdx = (y * w + x) * 4;
                                data[outIdx] = r / count; data[outIdx+1] = g / count; data[outIdx+2] = b / count;
                            }
                        }
                    }
                    miniCtx.putImageData(imgDataObj, 0, 0);
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    const coverScale = Math.max(canvas.width / w, canvas.height / h) * 1.05;
                    const bgWW = w * coverScale;
                    const bgHH = h * coverScale;
                    const bgXX = (canvas.width - bgWW) / 2;
                    const bgYY = (canvas.height - bgHH) / 2;
                    ctx.drawImage(miniCanvas, bgXX, bgYY, bgWW, bgHH);
                    ctx.restore();
                    const glassGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    if (isDark) {
                        glassGradient.addColorStop(0, 'rgba(10, 10, 10, 0.4)');
                        glassGradient.addColorStop(1, 'rgba(10, 10, 10, 0.95)');
                    } else {
                        glassGradient.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
                        glassGradient.addColorStop(1, 'rgba(255, 255, 255, 0.95)');
                    }
                    ctx.fillStyle = glassGradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else {
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                if (config.frameStyle === 'film') {
                    ctx.save();
                    const holeW = shortSide * 0.012;
                    const holeH = shortSide * 0.018;
                    const holeSpacing = shortSide * 0.032;
                    const holeRadius = holeW * 0.15;
                    const topY = (padTop - holeH) * 0.4;
                    const botY = canvas.height - (padBottom * 0.6) - holeH;
                    ctx.fillStyle = isDark ? '#000000' : '#ffffff'; 
                    ctx.beginPath();
                    for(let x = padLeft * 0.5; x < canvas.width - (padRight * 0.5); x += holeSpacing) {
                        if (ctx.roundRect) {
                            ctx.roundRect(x, topY, holeW, holeH, holeRadius);
                            ctx.roundRect(x, botY, holeW, holeH, holeRadius);
                        } else {
                            ctx.rect(x, topY, holeW, holeH);
                            ctx.rect(x, botY, holeW, holeH);
                        }
                    }
                    ctx.fill();
                    ctx.restore();
                }

                // 照片渲染 (包含宽幅电影的裁剪逻辑)
                ctx.save();
                if (config.frameStyle === 'glass') {
                    ctx.shadowColor = isDark ? 'rgba(0,0,0,0.6)' : 'rgba(0,0,0,0.15)';
                    ctx.shadowBlur = basePadding * 0.4;
                    ctx.shadowOffsetY = basePadding * 0.15;
                } else if (config.frameStyle === 'classic' || config.frameStyle === 'palette' || config.frameStyle === 'museum') {
                    ctx.shadowColor = isDark ? 'rgba(0,0,0,0.9)' : 'rgba(0,0,0,0.05)';
                    ctx.shadowBlur = basePadding * 0.3;
                    ctx.shadowOffsetY = basePadding * 0.1;
                }

                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                if (config.frameStyle === 'cinematic') {
                    // 计算原图中心裁剪区域
                    const imgAspect = img.naturalWidth / img.naturalHeight;
                    const targetAspect = drawW / drawH;
                    let sx, sy, sw, sh;
                    if (imgAspect > targetAspect) {
                        sh = img.naturalHeight;
                        sw = sh * targetAspect;
                        sx = (img.naturalWidth - sw) / 2;
                        sy = 0;
                    } else {
                        sw = img.naturalWidth;
                        sh = sw / targetAspect;
                        sx = 0;
                        sy = (img.naturalHeight - sh) / 2;
                    }
                    ctx.drawImage(img, sx, sy, sw, sh, padLeft + outerMargin, padTop + outerMargin, drawW, drawH);
                } else {
                    ctx.drawImage(img, padLeft + outerMargin, padTop + outerMargin, drawW, drawH);
                }
                ctx.restore();

                let fontStack = '-apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif';
                if (config.fontFamily === 'serif') fontStack = '"Playfair Display", "Noto Serif SC", "Songti SC", serif';
                else if (config.fontFamily === 'mono') fontStack = '"JetBrains Mono", "Courier New", monospace';
                else if (config.fontFamily === 'cinzel') fontStack = '"Cinzel", "Noto Serif SC", serif';

                const baseFontSize = shortSide * 0.024;
                ctx.letterSpacing = "0px";

                if (config.frameStyle === 'cinematic') {
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const textY = padTop + drawH + (padBottom / 2);
                    ctx.fillStyle = textColor;
                    ctx.font = `400 ${baseFontSize * 0.8}px ${fontStack}`;
                    let combinedText = '';
                    if(imgData.mainText && imgData.subText) {
                        combinedText = `${imgData.mainText}   /   ${imgData.subText}`;
                    } else {
                        combinedText = imgData.mainText || imgData.subText;
                    }
                    if (combinedText) {
                        ctx.letterSpacing = "1.5px"; 
                        ctx.fillText(combinedText.toUpperCase(), canvas.width / 2, textY);
                        ctx.letterSpacing = "0px";
                    }
                }
                else if (config.frameStyle === 'palette') {
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'bottom';
                    ctx.fillStyle = subTextColor; 
                    ctx.font = `400 ${baseFontSize * 0.55}px ${fontStack}`;
                    const topLeftX = padLeft + outerMargin;
                    const topLeftY = padTop + outerMargin - baseFontSize * 0.8;
                    let leftLines = [];
                    if (imgData.dateTimeStr) leftLines.push(`${imgData.dateTimeStr}`);
                    if (imgData.gpsStr) leftLines.push(`${imgData.gpsStr}`);
                    let currY = topLeftY;
                    for (let i = leftLines.length - 1; i >= 0; i--) {
                        ctx.fillText(leftLines[i], topLeftX, currY);
                        currY -= baseFontSize * 1.0;
                    }
                    const photoBotY = padTop + drawH + outerMargin;
                    const colorBlockW = drawW * 0.08; 
                    const colorBlockH = basePadding * 0.4;
                    const colorBlockY = photoBotY + basePadding * 0.9;
                    if (imgData.colors && imgData.colors.length > 0) {
                        for(let i=0; i<imgData.colors.length; i++) {
                            ctx.fillStyle = imgData.colors[i];
                            ctx.fillRect(padLeft + outerMargin + i * colorBlockW, colorBlockY, colorBlockW, colorBlockH);
                        }
                    }
                    ctx.textAlign = 'right';
                    ctx.textBaseline = 'top';
                    ctx.fillStyle = textColor;
                    ctx.font = `500 ${baseFontSize * 1.3}px ${fontStack}`;
                    const deviceY = photoBotY + basePadding * 0.7;
                    ctx.fillText(imgData.mainText || '', padLeft + outerMargin + drawW, deviceY);
                    ctx.fillStyle = subTextColor;
                    ctx.font = `400 ${baseFontSize * 0.6}px ${fontStack}`;
                    ctx.fillText(imgData.subText || '', padLeft + outerMargin + drawW, deviceY + baseFontSize * 1.8);
                } 
                else if (config.frameStyle === 'museum') {
                    const lineY = padTop + drawH + basePadding * 1.5;
                    ctx.beginPath();
                    ctx.moveTo(padLeft, lineY);
                    ctx.lineTo(padLeft + drawW, lineY);
                    ctx.lineWidth = Math.max(1, shortSide * 0.001);
                    ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
                    ctx.stroke();
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'top';
                    ctx.fillStyle = textColor;
                    ctx.font = `500 ${baseFontSize * 1.2}px ${fontStack}`;
                    ctx.fillText(imgData.mainText || '', padLeft, lineY + basePadding * 0.8);
                    ctx.fillStyle = subTextColor;
                    ctx.font = `400 ${baseFontSize * 0.6}px ${fontStack}`;
                    ctx.fillText(imgData.subText || '', padLeft, lineY + basePadding * 0.8 + baseFontSize * 1.8);
                }
                else if (config.frameStyle === 'film') {
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = textColor; 
                    const filmFont = '"JetBrains Mono", "Courier New", monospace';
                    ctx.font = `400 ${baseFontSize * 0.6}px ${filmFont}`;
                    ctx.letterSpacing = "2px";
                    const textYBot = canvas.height - (padBottom * 0.35);
                    ctx.textAlign = 'left';
                    if (imgData.mainText) {
                        ctx.fillText(`KODAK 400TX  •  ${imgData.mainText.toUpperCase()}`, padLeft, textYBot);
                    } else {
                        ctx.fillText(`KODAK 400TX`, padLeft, textYBot);
                    }
                    ctx.textAlign = 'right';
                    if (imgData.subText) {
                        ctx.fillText(`${imgData.subText.toUpperCase()}  •  [ 36A ]`, canvas.width - padRight, textYBot);
                    } else {
                        ctx.fillText(`[ 36A ]`, canvas.width - padRight, textYBot);
                    }
                    ctx.letterSpacing = "0px";
                }
                else if (hasText) {
                    const mainFont = `500 ${baseFontSize * 0.95}px ${fontStack}`; 
                    const subFont = `400 ${baseFontSize * 0.6}px ${fontStack}`;
                    const textYCenter = padTop + drawH + (padBottom / 2) + outerMargin;
                    ctx.font = mainFont; const mainW = ctx.measureText(imgData.mainText).width;
                    ctx.font = subFont; const subW = ctx.measureText(imgData.subText).width;
                    let currentLayout = config.textLayout;
                    if (config.preset === 'coords') currentLayout = 'center'; 
                    ctx.textBaseline = 'middle';
                    if (currentLayout === 'center') {
                        ctx.textAlign = 'center'; 
                        if (imgData.mainText && imgData.subText) {
                            ctx.fillStyle = textColor; ctx.font = mainFont;
                            ctx.fillText(imgData.mainText, canvas.width / 2, textYCenter - (baseFontSize * 0.45));
                            ctx.fillStyle = subTextColor; ctx.font = subFont;
                            ctx.fillText(imgData.subText, canvas.width / 2, textYCenter + (baseFontSize * 0.65));
                        } else {
                            const text = imgData.mainText || imgData.subText;
                            ctx.fillStyle = imgData.mainText ? textColor : subTextColor; 
                            ctx.font = imgData.mainText ? mainFont : subFont;
                            ctx.fillText(text, canvas.width / 2, textYCenter);
                        }
                    } else if (currentLayout === 'split') {
                        if (imgData.mainText) {
                            ctx.textAlign = 'left';
                            ctx.fillStyle = textColor; ctx.font = mainFont;
                            ctx.fillText(imgData.mainText, padLeft + outerMargin, textYCenter);
                        }
                        if (imgData.subText) {
                            ctx.textAlign = 'right';
                            ctx.fillStyle = subTextColor; ctx.font = subFont;
                            ctx.fillText(imgData.subText, canvas.width - padRight - outerMargin, textYCenter);
                        }
                    } else if (currentLayout === 'inline') {
                        ctx.textAlign = 'left';
                        const spacer = baseFontSize * 1.5;
                        const totalInlineW = mainW + (imgData.mainText && imgData.subText ? spacer : 0) + subW;
                        let inlineX = (canvas.width - totalInlineW) / 2;
                        if (imgData.mainText) {
                            ctx.fillStyle = textColor; ctx.font = mainFont;
                            ctx.fillText(imgData.mainText, inlineX, textYCenter);
                            inlineX += mainW + spacer;
                        }
                        if (imgData.subText) {
                            ctx.fillStyle = subTextColor; ctx.font = subFont;
                            ctx.fillText(imgData.subText, inlineX, textYCenter);
                        }
                    }
                }
            }

            downloadCurrentImage() {
                if (this.state.currentIndex < 0) return;
                try {
                    const dataUrl = this.dom.canvas.toDataURL('image/jpeg', 0.95);
                    const link = document.createElement('a');
                    const imgData = this.state.images[this.state.currentIndex];
                    const originalName = imgData.file.name.split('.')[0];
                    link.download = `Xiang_${originalName}_${new Date().getTime()}.jpg`;
                    link.href = dataUrl;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    this.showToast('保存成功', 'success');
                } catch (e) {
                    console.error("导出失败:", e);
                    this.showToast('导出失败，可能是图片尺寸超出了浏览器限制', 'error');
                }
            }

            async batchDownload() {
                if (this.state.images.length === 0) return;
                if (typeof JSZip === 'undefined') {
                    this.showToast('环境出错：需要 JSZIP 库支持', 'error');
                    return;
                }
                this.setLoading(true, '正在打包高画质照片，请耐心等待...');
                try {
                    const zip = new JSZip();
                    const offscreenCanvas = document.createElement('canvas');
                    const offscreenCtx = offscreenCanvas.getContext('2d');
                    for (let i = 0; i < this.state.images.length; i++) {
                        const imgData = this.state.images[i];
                        this.dom.uploadProgressText.innerText = `处理中 (${i+1}/${this.state.images.length})...`;
                        this.drawCanvas(imgData, offscreenCanvas, offscreenCtx);
                        const blob = await new Promise(resolve => offscreenCanvas.toBlob(resolve, 'image/jpeg', 0.92));
                        const originalName = imgData.file.name.split('.')[0];
                        zip.file(`Xiang_${originalName}_${i+1}.jpg`, blob);
                    }
                    this.dom.uploadProgressText.innerText = `正在生成 ZIP 压缩包...`;
                    const zipContent = await zip.generateAsync({ type: "blob" });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(zipContent);
                    link.download = `Xiang_Archive_${new Date().getTime()}.zip`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    this.showToast(`成功导出 ${this.state.images.length} 张照片`, 'success');
                } catch (error) {
                    console.error("Batch failed:", error);
                    this.showToast('批量导出失败', 'error');
                } finally {
                    this.setLoading(false);
                }
            }

            setLoading(isLoading, text = '处理中...') {
                if (isLoading) {
                    this.dom.processingOverlay.classList.remove('opacity-0', 'pointer-events-none');
                    this.dom.uploadProgressText.innerText = text;
                } else {
                    this.dom.processingOverlay.classList.add('opacity-0', 'pointer-events-none');
                }
            }

            showToast(message, type = 'info') {
                const toast = document.createElement('div');
                const bgColor = type === 'error' ? 'bg-red-600' : 'bg-black';
                toast.className = `toast-enter flex items-center justify-center gap-3 px-5 py-3 ${bgColor} text-white shadow-xl max-w-sm border border-white/10`;
                let icon = 'info';
                if (type === 'success') icon = 'check';
                if (type === 'error') icon = 'alert-triangle';
                toast.innerHTML = `
                    <i data-lucide="${icon}" class="w-3.5 h-3.5 shrink-0 opacity-70"></i>
                    <span class="text-[11px] tracking-wider font-medium">${message}</span>
                `;
                this.dom.toastContainer.appendChild(toast);
                lucide.createIcons({ root: toast });
                setTimeout(() => {
                    toast.classList.replace('toast-enter', 'toast-leave');
                    toast.addEventListener('animationend', () => toast.remove());
                }, 3000);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new FrameGenerator();
        });
    </script>

    <!-- ==========================================
         Microsoft Clarity 性能优化加载方案 
    ========================================== -->
    <script type="text/javascript">
        // 核心优化思路：完全不阻塞主渲染线程和首屏图片加载
        window.addEventListener('load', function() {
            // 定义 Clarity 的初始化函数
            var initClarity = function() {
                (function(c,l,a,r,i,t,y){
                    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
                    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
                    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
                })(window, document, "clarity", "script", "w4a2dtbhko");
            };

            // 使用 requestIdleCallback 确保在浏览器空闲时再执行脚本加载
            if ('requestIdleCallback' in window) {
                requestIdleCallback(initClarity);
            } else {
                // 如果浏览器不支持，则在页面加载完毕后再延迟1秒执行，确保绝对不抢网速
                setTimeout(initClarity, 1000);
            }
        });
    </script>
